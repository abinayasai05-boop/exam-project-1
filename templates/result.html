<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Viewer</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #47569a, #5b3780);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}

/* TITLE */
.card h2 {
    margin-bottom: 20px;
}

/* DETAILS */
.info {
    margin: 10px 0;
    font-size: 16px;
}

/* SCORE */
.score {
    font-size: 40px;
    font-weight: bold;
    margin: 20px 0;
    animation: pop 0.6s ease;
}

/* RESULT BADGE */
.status {
    font-size: 20px;
    margin-top: 10px;
    padding: 8px;
    border-radius: 10px;
}

.pass {
    background: #00c853;
}

.fail {
    background: #d50000;
}

/* BACK BUTTON */
a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    transition: 0.3s;
}

a:hover {
    background: rgba(0,0,0,0.5);
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
    from { transform: scale(0.6); }
    to { transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">

    <h2>🎓 Exam Result</h2>

    {% if student %}

        <div class="info"><b>Name:</b> {{ student.name }}</div>
        <div class="info"><b>Email:</b> {{ student.email }}</div>
        <div class="info"><b>Reg No:</b> {{ student.reg_no }}</div>
        <div class="info"><b>Subject:</b> {{ student.exam }}</div>

        <div class="score">
            {{ student.score }}
        </div>

        {% if student.score >= 50 %}
            <div class="status pass">✅ PASS</div>
        {% else %}
            <div class="status fail">❌ FAIL</div>
        {% endif %}

    {% else %}
        <p>No result found</p>
    {% endif %}

    <a href="/">⬅ Back</a>

</div>

</body>
</html>
