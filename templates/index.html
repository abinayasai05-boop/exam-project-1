<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #933880, #397477);
    min-height: 100vh;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px;
    color: white;
}

.header h1 {
    font-size: 40px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 20px;
}

/* CARD DESIGN */
.card {
    width: 320px;
    background: rgba(45, 22, 22, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    color: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c9a7;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #a44ab9;
    transform: scale(1.05);
}

/* ADMIN BUTTON */
.admin-btn {
    background: #527ec1;
}

.admin-btn:hover {
    background: #a44481;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
    color: white;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🎓 Online Exam Registration System</h1>
    <p>Register • Write Exam • View Results</p>
</div>

<div class="container">

    <!-- REGISTRATION -->
    <div class="card">
        <h2>📝 Register for Exam</h2>

        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email ID" required>
            <input type="text" name="reg_no" placeholder="Register Number" required>

            <select name="exam" required>
                <option value="">Select Subject</option>
                <option>DBMS</option>
                <option>Python</option>
                <option>Java</option>
                <option>Data Structures</option>
            </select>

            <button type="submit">Register Now</button>
        </form>
    </div>

    <!-- RESULT VIEW -->
    <div class="card">
        <h2>📊 View Result</h2>

        <form action="/result" method="POST">
            <input type="text" name="reg_no" placeholder="Enter Register Number" required>
            <button type="submit">Check Result</button>
        </form>

        <p style="margin-top:10px;"></p>
    </div>

    <!-- ADMIN-->
    <div class="card">
        <h2>⚙️ Admin</h2>

        <p>Manage student records & update scores</p>

        <br>

        <a href="{{ url_for('admin') }}">
            <button class="admin-btn">Go to Admin Dashboard</button>
        </a>

        <p style="margin-top:10px;"></p>
    </div>

</div>

</div>

</body>
</html>
